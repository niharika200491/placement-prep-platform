<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #141e30, #243b55);
            min-height: 100vh;
            padding: 40px;
        }

        .navbar {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            backdrop-filter: blur(10px);
        }

        .navbar h1 {
            font-size: 28px;
        }

        .logout-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background-color: crimson;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .logout-btn:hover {
            transform: scale(1.05);
        }

        .card-container {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            background-color: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #243b55;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
            color: #141e30;
        }

        .table-container {
            margin-top: 40px;
            background-color: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            letter-spacing: 1px;
        }

        th {
            background-color: #243b55;
            color: white;
            padding: 15px;
            text-align: left;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f5f5f5;
            transition: 0.3s;
        }

        .edit-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background-color: #243b55;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;

            margin-right: 10px;
        }

        .delete-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background-color: crimson;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .edit-btn:hover {
            transform: scale(1.05);
            background-color: #1b2d42;
        }

        .delete-btn:hover {
            transform: scale(1.05);
            background-color: darkred;
        }

        .search-form {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 35px;
            margin-bottom: 25px;
        }

        .search-form input {
            width: 320px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            box-shadow: 0px 3px 10px rgba(0, 0, 0, 0.2);
        }

        .search-form input:focus {
            border: 2px solid #243b55;
        }

        .search-form button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #243b55;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: bold;
        }

        .search-form button:hover {
            transform: scale(1.05);
            background-color: #1b2d42;
        }

        a {
            text-decoration: none;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }

        .ac {
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>Admin Dashboard</h1>

        <button class="logout-btn">Logout</button>
    </div>

    <div class="card-container">

        <div class="card">
            <h2>Total Users</h2>
            <p>{{ total_c }}</p>
        </div>

        <div class="card">
            <h2>Admins</h2>
            <p>1</p>
        </div>

    </div>
    <form method="GET" class="search-form">

        <input type="text" name="search" placeholder="Search by name or email">

        <button type="submit">Search</button>

    </form>

    <div class="table-container">

        <table>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th class="ac">Actions</th>
            </tr>

            {% for user in users %}

            <tr>

                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
                <td>{{ user[3] }}</td>

                <td class="actions">
                    <a href="/edit_user/{{user[0]}}">
                        <button class="edit-btn">
                            Edit
                        </button>
                    </a>
                    <a href="/delete-user/{{ user[0] }}"
                        onclick="return confirm('Are you sure you want to delete this user?')">
                        <button class="delete-btn">
                            Delete
                        </button>
                    </a>


                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
