<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 300px;
            height: 300px;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: moveRight 2s ease;
        }

        @keyframes moveRight {
            from {
                opacity: 0;
                transform: translateX(-200px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .login-form {
            margin-top: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid gray;
        }

        button {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            background-color: #243b55;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.03);
        }

        .error {
            margin-top: 10px;
            font-size: 14px;
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="box">

            <h2>Login</h2>
            {% if error %}
            <p class="error">{{error}}</p>
            {% endif %}

            <form class="login-form" method="POST">

                <input type="email" name="email" placeholder="Email">

                <input type="password" name="password" placeholder="Password">

                <button type="submit">Login</button>

            </form>

        </div>

    </div>

</body>

</html>
