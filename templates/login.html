    <!DOCTYPE html>
    <html lang="en">

    <head>
        <title>Login</title>

        <style>
            body {
                margin: 0;
                background: linear-gradient(to right, #141e30, #243b55);
                font-family: Arial, sans-serif;
            }

            .container {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .box {
                width: 300px;
                padding: 30px;
                background-color: white;
                border-radius: 12px;
                box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
                text-align: center;
            }

            input {
                width: 100%;
                padding: 10px;
                margin-top: 10px;
                border-radius: 6px;
                border: 1px solid gray;
            }

            button {
                width: 100%;
                padding: 10px;
                margin-top: 15px;
                border: none;
                border-radius: 6px;
                background-color: #243b55;
                color: white;
                cursor: pointer;
                transition: 0.3s ease;
            }

            button:hover {
                transform: scale(1.03);
            }
        </style>
    </head>

    <body>

        <div class="container">

            <div class="box">

                <h2>Login</h2>

                <input type="text" placeholder="Username">

                <input type="password" placeholder="Password">

                <button>Login</button>

            </div>

        </div>

    </body>
