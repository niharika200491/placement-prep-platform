<!DOCTYPE html>
<html lang="en">

<head>
    <title>Test</title>

    <script>
        let totalSeconds = 300;

        function startTimer() {

            const timerDisplay = document.getElementById("timer");

            const interval = setInterval(() => {

                let minutes = Math.floor(totalSeconds / 60);
                let seconds = totalSeconds % 60;

                timerDisplay.innerText =
                    minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

                totalSeconds--;

                if (totalSeconds < 0) {

                    clearInterval(interval);

                    alert("Time's up! Submitting your test.");

                    document.getElementById("testForm").submit();
                }

            }, 1000);
        }

        window.onload = startTimer;
    </script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
        }

        .timer-box {
            background-color: #ff4b5c;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 40px 0;
        }

        .question-box {
            background-color: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-box p {
            font-size: 18px;
            font-weight: bold;
        }

        .option {
            display: block;
            margin-top: 15px;
            margin-bottom: 12px;
            padding: 12px;
            background-color: #f2f2f2;
            border-radius: 8px;
            transition: 0.3s ease;
        }

        .option:hover {
            background-color: #dfe6e9;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background-color: #00b894;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .submit-btn:hover {
            transform: scale(1.02);
        }
    </style>

</head>

<body>

    <div class="navbar">

        <h2>Online Test</h2>

        <div class="timer-box">
            Time Remaining:
            <span id="timer">5:00</span>
        </div>

    </div>

    <div class="container">

        <form id="testForm" method="POST" action="/submit_test">

            {% for q in questions %}

            <div class="question-box">

                <p>
                    {{ loop.index }}. {{ q[2] }}
                </p>

                <label class="option">
                    <input type="radio" name="q{{ q[0] }}" value="1" required>
                    {{ q[3] }}
                </label>

                <label class="option">
                    <input type="radio" name="q{{ q[0] }}" value="2">
                    {{ q[4] }}
                </label>

                <label class="option">
                    <input type="radio" name="q{{ q[0] }}" value="3">
                    {{ q[5] }}
                </label>

                <label class="option">
                    <input type="radio" name="q{{ q[0] }}" value="4">
                    {{ q[6] }}
                </label>

            </div>

            {% endfor %}

            <button type="submit" class="submit-btn">
                Submit Test
            </button>

        </form>

    </div>

</body>

</html>
